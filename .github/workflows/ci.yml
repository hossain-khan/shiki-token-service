name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "test/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "eslint.config.js"
      - "wrangler.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "test/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "eslint.config.js"
      - "wrangler.toml"
      - ".github/workflows/ci.yml"

jobs:
  build:
    name: Lint, Format & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Test
        run: npx vitest run --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: hossain-khan/shiki-token-service
