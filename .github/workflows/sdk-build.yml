name: SDK Build

on:
  push:
    branches: [main]
    paths:
      - "sdk/**"
      - "sample/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/sdk-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "sdk/**"
      - "sample/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/sdk-build.yml"

jobs:
  build:
    name: Build SDK & Sample
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build SDK
        run: ./gradlew :sdk:build

      - name: Build Sample
        run: ./gradlew :sample:build
